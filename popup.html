<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 420px;
        font-family: -apple-system, sans-serif;
        background: #0a0a14;
        color: white;
      }

      /* ── Header ── */
      .header {
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header h1 {
        font-size: 18px;
        font-weight: 700;
      }
      .header .user-pill {
        font-size: 11px;
        background: rgba(255, 255, 255, 0.2);
        padding: 4px 10px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .logout-btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        font-size: 11px;
      }
      .logout-btn:hover {
        color: white;
      }

      /* ── Repost bar ── */
      .repost-bar {
        background: #13131f;
        border-bottom: 1px solid #1c1c2e;
        padding: 12px 16px;
      }
      .repost-bar .video-label {
        font-size: 11px;
        color: #667eea;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .repost-bar .site-badge {
        background: #667eea22;
        color: #667eea;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
      }
      .repost-bar textarea {
        width: 100%;
        padding: 8px 12px;
        background: #1a1a2e;
        border: 1px solid #2a2a3e;
        border-radius: 8px;
        color: white;
        font-size: 12px;
        resize: none;
        height: 48px;
        margin-bottom: 8px;
      }
      .repost-bar textarea:focus {
        outline: none;
        border-color: #667eea;
      }
      .btn-repost {
        width: 100%;
        padding: 9px;
        background: linear-gradient(135deg, #f093fb, #f5576c);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-repost:hover {
        opacity: 0.9;
      }
      .repost-status {
        font-size: 11px;
        color: #667eea;
        min-height: 16px;
        margin-top: 5px;
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        background: #0f0f1a;
        border-bottom: 1px solid #1c1c2e;
      }
      .tab {
        flex: 1;
        padding: 10px 4px;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        color: #444;
        border: none;
        background: none;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        position: relative;
      }
      .tab.active {
        color: #667eea;
        border-bottom-color: #667eea;
      }
      .tab:hover:not(.active) {
        color: #888;
      }
      .badge {
        position: absolute;
        top: 6px;
        right: 10px;
        background: #f5576c;
        color: white;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        font-size: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Tab content ── */
      .tab-body {
        height: 340px;
        overflow-y: auto;
        padding: 12px 14px;
      }
      .tab-body::-webkit-scrollbar {
        width: 4px;
      }
      .tab-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .tab-body::-webkit-scrollbar-thumb {
        background: #2a2a3e;
        border-radius: 4px;
      }

      /* ── Search ── */
      .search-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .search-row input {
        flex: 1;
        padding: 9px 12px;
        background: #1a1a2e;
        border: 1px solid #2a2a3e;
        border-radius: 8px;
        color: white;
        font-size: 13px;
      }
      .search-row input:focus {
        outline: none;
        border-color: #667eea;
      }
      .search-row button {
        padding: 9px 16px;
        background: #667eea;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      .invite-section {
        margin-top: 16px;
        border-top: 1px solid #1c1c2e;
        padding-top: 14px;
      }
      .invite-section label {
        font-size: 11px;
        color: #555;
        display: block;
        margin-bottom: 6px;
      }
      .invite-box {
        display: flex;
        gap: 6px;
        align-items: center;
        background: #1a1a2e;
        border-radius: 8px;
        padding: 8px 12px;
      }
      .invite-code {
        flex: 1;
        font-size: 12px;
        color: #667eea;
        word-break: break-all;
      }
      .copy-btn {
        padding: 5px 12px;
        background: #667eea22;
        border: 1px solid #667eea44;
        border-radius: 6px;
        color: #667eea;
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
      }
      .copy-btn:hover {
        background: #667eea44;
      }

      /* ── User card ── */
      .user-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: #13131f;
        border-radius: 10px;
        margin-bottom: 8px;
      }
      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        color: white;
        flex-shrink: 0;
      }
      .user-info {
        flex: 1;
      }
      .user-info .uname {
        font-size: 13px;
        font-weight: 600;
      }
      .user-info .usub {
        font-size: 11px;
        color: #555;
        margin-top: 2px;
      }
      .action-btn {
        padding: 6px 14px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }
      .btn-follow {
        background: #667eea;
        color: white;
      }
      .btn-follow:hover {
        background: #5a6fd6;
      }
      .btn-pending {
        background: #2a2a3e;
        color: #667eea;
        cursor: default;
      }
      .btn-following {
        background: #162616;
        color: #2ecc71;
        cursor: default;
      }
      .btn-accept {
        background: #2ecc71;
        color: white;
        margin-right: 4px;
      }
      .btn-decline {
        background: #2a0a0e;
        color: #f5576c;
      }
      .btn-accept:hover {
        background: #27ae60;
      }
      .btn-decline:hover {
        background: #3a0a0e;
      }

      /* ── Repost card ── */
      .repost-card {
        background: #13131f;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
        border-left: 3px solid #667eea;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .repost-card:hover {
        border-left-color: #f5576c;
      }
      .rc-site {
        font-size: 10px;
        color: #667eea;
        margin-bottom: 4px;
      }
      .rc-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .rc-comment {
        font-size: 11px;
        color: #888;
        font-style: italic;
        margin-bottom: 6px;
      }
      .rc-time {
        font-size: 10px;
        color: #444;
      }

      /* ── Auth ── */
      .auth-wrap {
        padding: 20px;
      }
      .auth-wrap input {
        width: 100%;
        padding: 10px 12px;
        margin: 5px 0;
        border-radius: 8px;
        border: 1px solid #2a2a3e;
        background: #1a1a2e;
        color: white;
        font-size: 13px;
      }
      .auth-wrap input:focus {
        outline: none;
        border-color: #667eea;
      }
      .btn-primary {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        margin-top: 6px;
      }
      .auth-status {
        font-size: 12px;
        color: #f5576c;
        margin-top: 8px;
        min-height: 16px;
      }
      .auth-tabs {
        display: flex;
        margin-bottom: 16px;
        gap: 6px;
      }
      .auth-tab {
        flex: 1;
        padding: 8px;
        text-align: center;
        border-radius: 8px;
        border: 1px solid #2a2a3e;
        background: none;
        color: #555;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
      }
      .auth-tab.active {
        background: #1a1a2e;
        color: white;
        border-color: #667eea;
      }

      .empty {
        color: #333;
        font-size: 12px;
        text-align: center;
        padding: 30px 16px;
        line-height: 1.8;
      }
      .status-flash {
        font-size: 11px;
        color: #2ecc71;
        margin-top: 6px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🔁 RepostIt</h1>
      <div id="user-pill"></div>
    </div>
    <div id="app"></div>
    <script src="firebase-config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
