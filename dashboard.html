<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RepostIt — Social</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, sans-serif;
        background: #0a0a14;
        color: white;
        min-height: 100vh;
      }
      .topbar {
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .topbar h1 {
        font-size: 20px;
      }
      .search-bar {
        flex: 1;
        max-width: 340px;
        display: flex;
        gap: 8px;
      }
      .search-bar input {
        flex: 1;
        padding: 8px 14px;
        border-radius: 20px;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        font-size: 13px;
      }
      .search-bar input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }
      .search-bar button {
        padding: 8px 16px;
        border-radius: 20px;
        border: none;
        background: white;
        color: #667eea;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
      }
      .invite-btn {
        padding: 8px 16px;
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        background: transparent;
        color: white;
        cursor: pointer;
        font-size: 13px;
      }

      .layout {
        display: grid;
        grid-template-columns: 260px 1fr 260px;
        gap: 24px;
        padding: 28px 32px;
        max-width: 1100px;
        margin: 0 auto;
      }

      .panel {
        background: #13131f;
        border-radius: 14px;
        padding: 18px;
      }
      .panel h2 {
        font-size: 14px;
        color: #667eea;
        margin-bottom: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #1a1a2e;
      }
      .user-card:last-child {
        border-bottom: none;
      }
      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
        color: white;
        flex-shrink: 0;
      }
      .user-card .info {
        flex: 1;
      }
      .user-card .name {
        font-size: 13px;
        font-weight: 600;
      }
      .user-card .sub {
        font-size: 11px;
        color: #555;
      }
      .user-card .action-btn {
        padding: 5px 12px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
      }
      .btn-follow {
        background: #667eea;
        color: white;
      }
      .btn-pending {
        background: #2a2a3e;
        color: #667eea;
      }
      .btn-following {
        background: #1a2a1a;
        color: #2ecc71;
      }
      .btn-accept {
        background: #2ecc71;
        color: white;
      }
      .btn-decline {
        background: #f5576c;
        color: white;
      }

      .feed-card {
        background: #1a1a2e;
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 12px;
        border-left: 4px solid #667eea;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .feed-card:hover {
        border-left-color: #f5576c;
      }
      .feed-card .fc-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .feed-card .fc-name {
        font-size: 13px;
        font-weight: 600;
      }
      .feed-card .fc-time {
        font-size: 11px;
        color: #444;
        margin-left: auto;
      }
      .feed-card .fc-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .feed-card .fc-site {
        font-size: 11px;
        color: #667eea;
      }
      .feed-card .fc-comment {
        font-size: 12px;
        color: #999;
        margin-top: 8px;
        font-style: italic;
      }

      .invite-box {
        background: #1a1a2e;
        border-radius: 10px;
        padding: 12px;
        margin-top: 10px;
      }
      .invite-box p {
        font-size: 11px;
        color: #666;
        margin-bottom: 8px;
      }
      .invite-link {
        background: #0f0f1a;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 11px;
        color: #667eea;
        word-break: break-all;
      }
      .copy-btn {
        width: 100%;
        margin-top: 8px;
        padding: 7px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        cursor: pointer;
        font-size: 12px;
      }

      .search-results {
        margin-top: 10px;
      }
      .notif-dot {
        background: #f5576c;
        color: white;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        font-size: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-left: 6px;
        vertical-align: middle;
      }
      .empty {
        color: #333;
        font-size: 12px;
        text-align: center;
        padding: 20px 0;
      }
      #status-msg {
        font-size: 12px;
        color: #667eea;
        margin-top: 6px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>🔁 RepostIt</h1>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search by username..."
        />
        <button id="search-btn">Search</button>
      </div>
      <button class="invite-btn" id="gen-invite">🔗 Invite Link</button>
      <span id="topbar-user" style="font-size: 13px; opacity: 0.8"></span>
    </div>

    <div class="layout">
      <!-- Left: Following / Followers -->
      <div>
        <div class="panel" id="following-panel">
          <h2>Following</h2>
          <div class="empty">Loading...</div>
        </div>
        <br />
        <div class="panel" id="followers-panel">
          <h2>Followers</h2>
          <div class="empty">Loading...</div>
        </div>
      </div>

      <!-- Center: Feed -->
      <div>
        <div class="panel" style="padding: 0; overflow: hidden">
          <div
            style="
              padding: 16px 18px;
              border-bottom: 1px solid #1a1a2e;
              font-size: 14px;
              color: #667eea;
              font-weight: 600;
            "
          >
            📰 Following Feed
          </div>
          <div
            id="main-feed"
            style="padding: 16px; max-height: 600px; overflow-y: auto"
          >
            <div class="empty">Loading feed...</div>
          </div>
        </div>
      </div>

      <!-- Right: Requests + Invite -->
      <div>
        <div class="panel" id="requests-panel">
          <h2>Follow Requests <span id="req-count"></span></h2>
          <div class="empty">Loading...</div>
        </div>
        <br />
        <div class="panel">
          <h2>Invite a Friend</h2>
          <div class="invite-box">
            <p>Share this link — they'll be auto-connected to you!</p>
            <div class="invite-link" id="invite-link">Generating...</div>
            <button class="copy-btn" id="copy-invite">📋 Copy Link</button>
          </div>
          <div id="status-msg"></div>
        </div>

        <!-- Search Results -->
        <div
          class="panel search-results"
          id="search-results-panel"
          style="display: none; margin-top: 0"
        >
          <h2>Search Results</h2>
          <div id="search-results"></div>
        </div>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
